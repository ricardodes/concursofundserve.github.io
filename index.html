/* DASHBOARD PANEL */
.dashboard-panel{background:var(--white);border-bottom:1px solid var(--border);padding:0}
.dash-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:1px;background:var(--border)}
.dash-card{background:var(--white);padding:14px 16px;text-align:center}

.dash-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);margin-top:2px}

.prova-header{background:var(--navy);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.prova-title{color:#fff;font-size:14px;font-weight:700}
.prova-timer{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:800;color:var(--gold2)}
.prova-timer.warning{color:#ef4444;animation:pulse 1s infinite}

.prova-progress-bar{height:4px;background:rgba(255,255,255,.2)}
.prova-progress-fill{height:100%;background:var(--teal2);transition:width .3s}

.prova-result-num{font-size:64px;font-weight:800;font-family:'JetBrains Mono',monospace}

  <script>
// ============================================================
// GEMINI API — CONFIGURAÇÃO SEGURA (Zero-Footprint)
// Link Oficial: https://aistudio.google.com/app/apikey
// ============================================================

let GEMINI_API_KEY = ""; // Inicialmente vazia para segurança

/**
 * Solicita a chave ao usuário apenas quando necessário
 */
async function getApiKey() {
    if (!GEMINI_API_KEY) {
        const key = prompt("🔑 Chave de API necessária para usar a IA.\n\nObtenha gratuitamente em: https://aistudio.google.com/app/apikey\n(A chave fica salva apenas enquanto esta aba estiver aberta)");
        if (key && key.trim().length > 10) {
            GEMINI_API_KEY = key.trim();
        } else {
            alert("Ação cancelada. Sem a chave, as funções de IA não funcionarão.");
            return null;
        }
    }
    return GEMINI_API_KEY;
}

/**
 * Função principal para chamar o Gemini 1.5 Flash
 */
async function callAI(systemPrompt, messages) {
    const key = await getApiKey();
    if (!key) throw new Error("API Key não configurada.");

    // Endpoint oficial do Gemini 1.5 Flash (v1beta)
    const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`;

    // Conversão do formato de mensagens (standard para Google AI)
    const contents = messages.map(m => ({
        role: m.role === 'assistant' ? 'model' : 'user',
        parts: [{ text: m.content }]
    }));

    const requestBody = {
        contents: contents,
        system_instruction: {
            parts: [{ text: systemPrompt }]
        },
        generationConfig: {
            temperature: 0.7,
            topK: 40,
            topP: 0.95,
            maxOutputTokens: 2048,
        }
    };

    try {
        const response = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(requestBody)
        });

        if (!response.ok) {
            const errorData = await response.json();
            // Se o erro for de autenticação, limpa a chave para pedir de novo
            if (response.status === 401 || response.status === 403) {
                GEMINI_API_KEY = "";
                throw new Error("Chave de API inválida ou expirada. Tente novamente.");
            }
            throw new Error(errorData.error?.message || "Erro desconhecido na API do Gemini.");
        }

        const data = await response.json();
        
        // Extração do texto da resposta padrão do Gemini
        if (data.candidates && data.candidates[0].content && data.candidates[0].content.parts) {
            return data.candidates[0].content.parts[0].text;
        } else {
            throw new Error("A IA retornou uma resposta vazia ou em formato inesperado.");
        }

    } catch (err) {
        console.error("Erro na requisição Gemini:", err);
        throw err;
    }
}

// ============================================================
// LÓGICA DE INTERFACE E ESTUDO (Mantenha o resto do seu código JS abaixo)
// ============================================================

// Exemplo de como a função callAI é integrada no resto do sistema
async function openAI(tema) {
    const promptSistema = "Você é um professor especialista em concursos públicos para Analista Previdenciário.";
    const mensagens = [{role: 'user', content: `Explique de forma didática o seguinte tema: ${tema}`}];
    
    try {
        // Mostra loading
        console.log("Chamando Gemini...");
        const resposta = await callAI(promptSistema, mensagens);
        // Exibe a resposta no seu modal...
        console.log(resposta);
    } catch (e) {
        alert(e.message);
    }
}

</script>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>PLATAFORMA LENDÁRIA DE APROVAÇÃO</title>

<style>
body{font-family:Arial;background:#020617;color:#fff;padding:20px}
h1{color:#38bdf8}
.card{background:#0f172a;padding:15px;border-radius:12px;margin:10px}
.grid{display:flex;flex-wrap:wrap;gap:10px}
button{padding:8px 12px;border:none;border-radius:8px;cursor:pointer}
.green{background:#16a34a;color:#fff}
.red{background:#dc2626;color:#fff}
.blue{background:#2563eb;color:#fff}
.purple{background:#7c3aed;color:#fff}
</style>
</head>

<body>

<h1>🚀 PLATAFORMA LENDÁRIA</h1>

<div class="grid">

<div class="card">
<h3>📊 Desempenho</h3>
<p>Acertos: <span id="acertos"></span></p>
<p>Erros: <span id="erros"></span></p>
<p>Winrate: <span id="winrate"></span></p>
<p>Hoje: <span id="hoje"></span> questões</p>
<p>Streak: <span id="streak"></span> dias</p>
</div>

<div class="card">
<h3>🎯 Matéria Fraca</h3>
<p id="fraca"></p>
</div>

<div class="card">
<h3>📅 Revisões</h3>
<div id="revisoes"></div>
</div>

<div class="card">
<h3>❌ Erros</h3>
<div id="errosLista"></div>
</div>

</div>

<div class="card">
<h3>⚡ Treino</h3>

<select id="materia">
<option>Previdenciário</option>
<option>Português</option>
<option>Matemática</option>
<option>TI</option>
</select>

<br><br>

<button class="green" onclick="res(true)">Acertei</button>
<button class="red" onclick="res(false)">Errei</button>
<button class="blue" onclick="revisao(1)">Revisar 1d</button>
<button class="blue" onclick="revisao(3)">Revisar 3d</button>
<button class="blue" onclick="revisao(7)">Revisar 7d</button>

</div>

<div class="card">
<h3>⏱️ Modo Prova</h3>
<p>Tempo: <span id="timer">0</span>s</p>
<p>Acertos: <span id="pAcertos">0</span></p>
<p>Erros: <span id="pErros">0</span></p>
<button class="purple" onclick="start()">Iniciar</button>
<button class="purple" onclick="stop()">Finalizar</button>
</div>

<div class="card">
<h3>📈 Evolução</h3>
<canvas id="grafico" width="500" height="200"></canvas>
</div>

<script>

// ================= BANCO =================
let db = JSON.parse(localStorage.getItem("ldb")) || {
 acertos:0, erros:0, historico:[],
 revisoes:[], errosLista:[],
 materias:{},
 dias:{}
};

// ================= SAVE =================
function save(){
 localStorage.setItem("ldb", JSON.stringify(db));
}

// ================= RESULT =================
function res(acertou){

 let mat = document.getElementById("materia").value;

 if(!db.materias[mat]){
  db.materias[mat]={a:0,e:0};
 }

 if(acertou){
  db.acertos++;
  db.materias[mat].a++;
 } else {
  db.erros++;
  db.materias[mat].e++;
  db.errosLista.push(mat+" - erro");
 }

 let hoje = new Date().toISOString().split("T")[0];
 db.dias[hoje]=(db.dias[hoje]||0)+1;

 db.historico.push({acertou});

 save();
 update();
}

// ================= FRAQUEZA =================
function fraqueza(){
 let pior="", max=0;

 for(let m in db.materias){
  let e = db.materias[m].e;
  if(e>max){
   max=e;
   pior=m;
  }
 }
 return pior || "—";
}

// ================= STREAK =================
function calcStreak(){
 let dias = Object.keys(db.dias).sort();
 let streak=0;

 for(let i=dias.length-1;i>=0;i--){
  if(db.dias[dias[i]]){
   streak++;
  } else break;
 }
 return streak;
}

// ================= UPDATE =================
function update(){

 let total = db.acertos + db.erros;
 let win = total ? ((db.acertos/total)*100).toFixed(1):0;

 document.getElementById("acertos").innerText=db.acertos;
 document.getElementById("erros").innerText=db.erros;
 document.getElementById("winrate").innerText=win+"%";

 let hoje = new Date().toISOString().split("T")[0];
 document.getElementById("hoje").innerText=db.dias[hoje]||0;

 document.getElementById("streak").innerText=calcStreak();
 document.getElementById("fraca").innerText=fraqueza();

 document.getElementById("errosLista").innerHTML =
  db.errosLista.slice(-10).map(e=>"<p>"+e+"</p>").join("");

 draw();
}

// ================= PROVA =================
let t=0, int, pa=0, pe=0;

function start(){
 t=0; pa=0; pe=0;
 int=setInterval(()=>{t++;timer.innerText=t},1000);
}

function stop(){
 clearInterval(int);
 alert("Resultado: "+pa+" acertos / "+pe+" erros");
}

// ================= GRAFICO =================
function draw(){
 let ctx = grafico.getContext("2d");
 ctx.clearRect(0,0,500,200);

 let x=10;
 db.historico.slice(-30).forEach(h=>{
  ctx.fillStyle = h.acertou?"#22c55e":"#ef4444";
  ctx.fillRect(x,100,10,h.acertou?-60:60);
  x+=15;
 });
}

// ================= INIT =================
update();

</script>

</body>
</html>
